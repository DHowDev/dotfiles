# Personal tmux additions
# Sourced at the end of ~/.config/tmux/tmux.conf (Omarchy-managed)
# This file is tracked in ~/dotfiles/tmux/local.conf

# Tab navigation
bind-key Tab next-window
bind-key BTab previous-window

# Vi copy mode (mirrors Omarchy defaults but owned here as preference)
setw -g mode-keys vi
bind -T copy-mode-vi v     send -X begin-selection
bind -T copy-mode-vi y     send -X copy-selection-and-cancel
bind -T copy-mode-vi Escape send -X cancel
